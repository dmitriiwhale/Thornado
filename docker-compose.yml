# TimescaleDB + gateway. Copy .env.example to .env and adjust if needed.
#
# Only database:
#   docker compose up postgres -d
# Then run gateway on the host with DATABASE_URL pointing at localhost (see .env.example).
#
# Full stack (DB + gateway in Docker):
#   docker compose up -d

services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: thornado-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_PROXY_TARGET: http://gateway:3001
    depends_on:
      gateway:
        condition: service_started

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: thornado-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thornado}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thornado}
      POSTGRES_DB: ${POSTGRES_DB:-thornado}
    # Host port defaults to 5433 so a local Postgres on 5432 does not block compose.
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - thornado_pgdata:/var/lib/postgresql/data
    healthcheck:
      # Uses env vars from the Postgres image (same as POSTGRES_* above).
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  execution:
    build:
      context: ..
      dockerfile: thornado/gateway/execution/Dockerfile
    container_name: thornado-execution
    restart: unless-stopped
    ports:
      - "${EXECUTION_PORT:-3003}:3003"
    environment:
      EXECUTION_BIND_ADDR: "0.0.0.0:3003"
      EXECUTION_NETWORK: ${EXECUTION_NETWORK:-test}
      EXECUTION_NADO_GATEWAY_URL: ${EXECUTION_NADO_GATEWAY_URL:-}
      EXECUTION_NADO_TRIGGER_URL: ${EXECUTION_NADO_TRIGGER_URL:-}

  chart:
    build:
      context: ..
      dockerfile: thornado/gateway/chart/Dockerfile
    container_name: thornado-chart
    restart: unless-stopped
    ports:
      - "${CHART_PORT:-3004}:3004"
    environment:
      CHART_BIND_ADDR: "0.0.0.0:3004"
      CHART_DATABASE_URL: postgres://${POSTGRES_USER:-thornado}:${POSTGRES_PASSWORD:-thornado}@postgres:5432/${POSTGRES_DB:-thornado}?sslmode=disable
      CHART_NETWORK: ${CHART_NETWORK:-test}
      CHART_NADO_WS_URL: ${CHART_NADO_WS_URL:-}
      CHART_NADO_ARCHIVE_URL: ${CHART_NADO_ARCHIVE_URL:-}
      CHART_DEFAULT_GRANULARITY: ${CHART_DEFAULT_GRANULARITY:-60}
      CHART_SUPPORTED_GRANULARITIES: ${CHART_SUPPORTED_GRANULARITIES:-60,300,900,3600,7200,14400,86400}
      CHART_HISTORY_LIMIT: ${CHART_HISTORY_LIMIT:-500}
      CHART_CACHE_CAPACITY: ${CHART_CACHE_CAPACITY:-1500}
      CHART_PREWARM_ALL: ${CHART_PREWARM_ALL:-false}
      CHART_PREWARM_SYMBOLS: ${CHART_PREWARM_SYMBOLS:-}
      CHART_PREWARM_GRANULARITIES: ${CHART_PREWARM_GRANULARITIES:-60}
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: thornado-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3001}:3001"
    environment:
      PORT: "3001"
      # Hostname `postgres` is the Docker service name (same Compose network).
      DATABASE_URL: postgres://${POSTGRES_USER:-thornado}:${POSTGRES_PASSWORD:-thornado}@postgres:5432/${POSTGRES_DB:-thornado}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SIWE_DOMAIN: ${SIWE_DOMAIN:-localhost:5173}
      EXECUTION_SERVICE_URL: ${EXECUTION_SERVICE_URL:-http://execution:3003}
    depends_on:
      postgres:
        condition: service_healthy
      execution:
        condition: service_started
      chart:
        condition: service_started

volumes:
  thornado_pgdata:
